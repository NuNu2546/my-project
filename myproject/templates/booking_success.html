<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Success - จองแปลงผักสำเร็จ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .success-card {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .icon {
            font-size: 60px;
            color: #10B981; /* สีเขียว */
            margin-bottom: 20px;
        }
        h1 {
            color: #1F2937;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #4B5563;
            margin-bottom: 30px;
        }
        .details {
            background-color: #F9FAFB;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-bottom: 30px;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .detail-item strong {
            color: #374151;
        }
        .detail-item span {
            color: #6B7280;
        }
        .total-price {
            border-top: 1px solid #E5E7EB;
            padding-top: 15px;
            margin-top: 15px;
            font-size: 18px;
            color: #10B981;
            font-weight: bold;
        }
        .btn-home {
            display: inline-block;
            background-color: #10B981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-home:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon">✅</div>
        <h1>ทำรายการสำเร็จ!</h1>
        <p>การจองแปลงผักของคุณได้รับการยืนยันแล้ว</p>

        <div class="details">
            <div class="detail-item">
                <strong>พืชที่ปลูก:</strong>
                <span>{{ plant }}</span> 
            </div>
            <div class="detail-item">
                <strong>วันที่เริ่มปลูก:</strong>
                <span>{{ start_date|date:"d M Y" }}</span>
            </div>
            <div class="detail-item">
                <strong>คาดว่าจะเก็บเกี่ยว:</strong>
                <span>{{ harvest_date|date:"d M Y" }}</span>
            </div>
            <div class="detail-item total-price">
                <strong>ราคารวม:</strong>
                <span>฿{{ price|floatformat:2 }}</span>
            </div>
        </div>

        <a href="{% url 'home' %}" class="btn-home">กลับสู่หน้าหลัก</a>
    </div>

</body>
</html>
