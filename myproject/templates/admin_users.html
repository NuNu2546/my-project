{% extends 'base_admin.html' %}
{% block content %}
    <div class="admin-header"><h1>Quantum <span>Users</span> / Database</h1></div>
    <div class="data-section">
        <table>
            <thead><tr><th>ID</th><th>USERNAME</th><th>EMAIL</th><th>ACTIONS</th></tr></thead>
            <tbody>
                {% for u in all_users %}
                <tr><td>#{{ u.id }}</td><td>{{ u.username }}</td><td>{{ u.email }}</td><td><a href="{% url 'admin_edit' 'user' u.id %}" class="btn-manage">EDIT</a></td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
