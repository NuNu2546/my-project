{% extends 'base_admin.html' %}
{% block content %}
    <div class="admin-header"><h1>Quantum <span>Orders</span> / Logs</h1></div>
    <div class="data-section">
        <table>
            <thead><tr><th>ID</th><th>USER</th><th>TOTAL</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
            <tbody>
                {% for o in all_orders %}
                <tr><td>#{{ o.id }}</td><td>{{ o.user.username }}</td><td style="color:var(--primary-neon);">${{ o.total_price }}</td><td>{{ o.status }}</td><td><a href="/admin/store/order/{{ o.id }}/change/" target="_blank" class="btn-manage">MANAGE</a></td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
