{% extends 'base_admin.html' %}
{% block content %}
    <div class="admin-header"><h1>Quantum <span>Plots</span> / Allocation</h1></div>
    <div class="data-section">
        <table>
            <thead><tr><th>PLOT</th><th>USER</th><th>DATE</th><th>STATUS</th></tr></thead>
            <tbody>
                {% for p in all_plots %}
                <tr><td>{{ p.plot_name }}</td><td>{{ p.user.username }}</td><td>{{ p.booking_date|date:"d M Y" }}</td><td>{{ p.status }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
